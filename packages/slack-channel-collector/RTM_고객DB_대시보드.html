<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTM 고객 DB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--bg:#FAFAFA;--surface:#FFFFFF;--fg:#18181B;--muted:#71717A;--line:#E4E4E7;--accent:#EA580C;--accent-soft:#FFF1E7;--green:#16A34A;--green-soft:#EAF7EE;--blue:#2563EB;--blue-soft:#EFF4FE;--purple:#7C3AED;--purple-soft:#F3EFFE}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Freesentation','Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:13px;padding:20px}
h1{font-size:20px;font-weight:800}
.sub{color:var(--muted);font-size:12px;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.btn{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--fg)}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.06);color:#fff}
.btn:disabled{opacity:.5;cursor:wait}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.kpi .v{font-size:22px;font-weight:800;margin-top:2px}
.kpi .lab{color:var(--muted);font-size:11.5px}
.kpi.hl .v{color:var(--accent)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.card h3{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.chartbox{height:150px;position:relative}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input[type=search],select,textarea,input[type=text]{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--surface);font-family:inherit;color:var(--fg)}
input[type=search]{flex:1;min-width:200px}
.chip{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:600}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.viewtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.viewtoggle .vt{padding:7px 16px;cursor:pointer;font-weight:700;font-size:12.5px;color:var(--muted);background:var(--surface)}
.viewtoggle .vt.on{background:var(--fg);color:#fff}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th{background:#F4F4F5;text-align:left;padding:8px 10px;font-size:11.5px;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--accent)}
td{padding:8px 10px;border-top:1px solid var(--line);vertical-align:top}
tr.row{cursor:pointer}
tr.row:hover td{background:#FFF8F3}
tr.dim td{color:#B0B0B6}
.badge{display:inline-block;border-radius:5px;padding:1.5px 7px;font-size:10.5px;font-weight:700;margin-right:3px;white-space:nowrap}
.b-relate{background:var(--accent-soft);color:var(--accent)}
.b-feat{background:var(--blue-soft);color:var(--blue)}
.b-mail{background:#F4F4F5;color:var(--muted)}
.b-new{background:var(--green-soft);color:var(--green)}
.b-status{background:#FEF2F2;color:#DC2626}
.b-ind{background:var(--purple-soft);color:var(--purple)}
.b-auto{background:#FEF9C3;color:#A16207}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:10px;color:var(--muted)}
.drawer{position:fixed;top:0;right:-500px;width:480px;max-width:94vw;height:100vh;background:var(--surface);border-left:1px solid var(--line);box-shadow:-8px 0 30px rgba(0,0,0,.08);transition:right .25s;padding:20px;overflow-y:auto;z-index:50}
.drawer.open{right:0}
.drawer h2{font-size:17px;margin-bottom:2px;padding-right:24px}
.drawer .close{position:absolute;top:14px;right:14px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)}
.field{margin:10px 0}.field .k{font-size:11px;color:var(--muted)}.field .v{font-size:13.5px;margin-top:1px}
.editgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.editgrid label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.editgrid input,.editgrid textarea{width:100%}
.editgrid .full{grid-column:1/-1}
.tl{border-left:2px solid var(--line);margin-left:6px;padding-left:14px;margin-top:8px}
.tl .ev{margin-bottom:12px;position:relative}
.tl .ev:before{content:'';position:absolute;left:-19.5px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
.tl .ev .d{font-size:11px;color:var(--muted)}
.member{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--fg);color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;z-index:99;display:none;max-width:80vw}
.empty{text-align:center;color:var(--muted);padding:30px}
.hint{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>RTM 고객 DB <span style="color:var(--accent)">통합 대시보드</span></h1>
    <div class="sub" id="syncinfo">메일링 리스트 + 슬랙 #sales-inbound (릴레잇·피트페이퍼) · 기준 2026-07-09</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" id="addBtn">＋ 리드 직접 추가</button>
    <button class="btn" id="exportBtn">CSV 내보내기</button>
    <button class="btn primary" id="syncBtn">슬랙 새 리드 동기화</button>
  </div>
</div>

<div class="kpis" id="kpis"></div>

<div class="charts">
  <div class="card"><h3>업종별 회사 (전체 DB, 업종 입력된 회사 기준)</h3><div class="chartbox"><canvas id="chIndustry"></canvas></div></div>
  <div class="card"><h3>관심 솔루션별 리드 (전체 DB, 고유 고객)</h3><div class="chartbox"><canvas id="chInterest"></canvas></div></div>
</div>

<div class="controls">
  <div class="viewtoggle">
    <span class="vt" data-v="company">회사 뷰</span>
    <span class="vt" data-v="person">고객 뷰</span>
  </div>
  <input type="search" id="q" placeholder="이름, 회사, 업종, 이메일, 문의내용 검색…">
  <select id="fSrc"></select>
  <select id="fInterest"><option value="">관심 솔루션 전체</option></select>
  <select id="fStatus"><option value="정상">정상만</option><option value="">전체(내부·테스트 포함)</option></select>
</div>

<div id="tablewrap"></div>
<div class="pager">
  <span id="pinfo"></span>
  <button class="btn" id="prev">이전</button>
  <button class="btn" id="next">다음</button>
</div>

<div class="drawer" id="drawer">
  <button class="close" onclick="document.getElementById('drawer').classList.remove('open')">✕</button>
  <div id="dbody"></div>
</div>
<div class="toast" id="toast"></div>
<datalist id="owners">
  <option value="이건영"><option value="허정"><option value="유남규"><option value="김홍철">
  <option value="이영주"><option value="이욱"><option value="박진우"><option value="최동현">
</datalist>
<datalist id="solutions">
  <option value="Hubble"><option value="EHM"><option value="RISA">
  <option value="M.AX Agent"><option value="TS Agent"><option value="기타">
</datalist>

};
const CO_ALIAS={'sea':'에스이에이','에스이에이이':'에스이에이','s.e.a':'에스이에이','rtm':'알티엠','유라':'yura'};

let state={q:'',src:'all',interest:'',status:'정상',sort:'l',dir:-1,page:0,per:50,view:'company'};
try{Object.assign(state,JSON.parse(localStorage.getItem('rtm-db-ui')||'{}'),{page:0})}catch(e){}
let extra={lastTs:INIT_TS,events:[]};
try{const s=JSON.parse(localStorage.getItem('rtm-db-extra')||'null'); if(s&&s.lastTs)extra=s}catch(e){}
let userCInfo={};
try{userCInfo=JSON.parse(localStorage.getItem('rtm-db-company')||'{}')}catch(e){}

let recs, evts, byEmail;
const JUNK=new Set(['test@gmail.com','2@naver.com','sadsad@asdsa.com','ㅋ@ㅋ.com']);
function statusOf(em,nm){em=(em||'').toLowerCase();
  if(em.endsWith('@rtm.ai'))return '내부';
  if(JUNK.has(em)||(nm||'').includes('테스트'))return '테스트';
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em))return '테스트';
  return '정상';}
function normPhone(p){const d=(p||'').replace(/\D/g,'');if(!d||/^0+$/.test(d))return '';
  if(d.length===11&&d.startsWith('010'))return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);return d;}
function normInterest(i){return (i||'').replace(' Brochure','').replace('2025 ','').replace('Hubble Engine','Hubble').trim();}
function normCo(name){
  let k=(name||'').toLowerCase().replace(/\(주\)|㈜|주식회사/g,'').replace(/[\s()]/g,'').replace(/\.(?=.)/g,'').trim();
  return CO_ALIAS[k]||k;
}
function cinfo(key){
  const auto=AUTO_CINFO[key]||{};
  const user=userCInfo[key]||{};
  return {ind:user.ind??auto.ind??'',sub:user.sub??auto.sub??'',desc:user.desc??auto.desc??'',memo:user.memo||'',owner:user.owner||'',edited:!!user.edited,auto:!!(AUTO_CINFO[key]&&(auto.ind||auto.desc))};
}
function saveCInfo(key,data){userCInfo[key]={...data,edited:true};localStorage.setItem('rtm-db-company',JSON.stringify(userCInfo));}

function rebuild(){
  recs=BASE.map(r=>({...r,i:r.i.map(normInterest).filter((v,ix,a)=>v&&a.indexOf(v)===ix),s:[...r.s],isNew:false}));
  evts=BASE_EVTS.map(e=>({...e}));
  byEmail={};recs.forEach(r=>byEmail[r.e]=r);
  for(const e of extra.events){applyEvent(e)}
  render();
}
function applyEvent(e){
  evts.push(e);
  let r=byEmail[e.em];
  if(!r){r={e:e.em,n:e.nm||'',c:e.co||'',d:e.dept||'',t:e.title||'',p:normPhone(e.ph),i:[],s:[],st:statusOf(e.em,e.nm),sub:0,f:e.dt.slice(0,10),l:e.dt.slice(0,10),a:0,q:'',isNew:true};
    byEmail[e.em]=r;recs.unshift(r);}
  if(e.nm&&!r.n)r.n=e.nm; if(e.co&&!r.c)r.c=e.co;
  if(e.ph&&!r.p)r.p=normPhone(e.ph); if(e.dept&&!r.d)r.d=e.dept; if(e.title&&!r.t)r.t=e.title;
  const it=normInterest(e.it); if(it&&!r.i.includes(it))r.i.push(it);
  let src;
  if(e.src==='relate')src='릴레잇(홈페이지)';
  else if(e.src==='manual'){const tm=(e.iq||'').match(/^\[(.+?)\]/);src=tm?tm[1]:'수기입력';}
  else src='피트페이퍼';
  if(!r.s.includes(src))r.s.push(src);
  if(e.dt.slice(0,10)>r.l)r.l=e.dt.slice(0,10);
  if(e.dt.slice(0,10)<r.f)r.f=e.dt.slice(0,10);
  r.a++;
  if(e.iq)r.q=(r.q?r.q+' | ':'')+'['+e.dt.slice(0,10)+'] '+e.iq;
}

function filtered(){
  const q=state.q.toLowerCase();
  return recs.filter(r=>{
    if(state.status&&r.st!==state.status)return false;
    if(state.src==='multi'){if(r.s.length<2)return false}
    else if(state.src==='new'){if(r.s.includes('메일링리스트'))return false}
    else if(state.src!=='all'&&!r.s.includes(state.src))return false;
    if(state.interest&&!r.i.some(i=>i.includes(state.interest)))return false;
    if(q){
      const ci=cinfo(normCo(r.c));
      const hay=(r.e+' '+r.n+' '+r.c+' '+r.p+' '+r.q+' '+r.s.join(' ')+' '+ci.ind+' '+ci.sub+' '+ci.desc+' '+ci.memo).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  }).sort((a,b)=>{const k=state.sort;let x=a[k],y=b[k];
    if(k==='a'){return (x-y)*state.dir}
    return String(x).localeCompare(String(y))*state.dir;});
}
function companyGroups(){
  const map={};
  for(const r of filtered()){
    const key=normCo(r.c)||'(회사 미상)';
    if(!map[key])map[key]={key,name:r.c||'(회사 미상)',members:[],i:[],s:[],l:'',a:0,isNew:false};
    const g=map[key];
    if(r.c&&r.c.length>g.name.length)g.name=r.c;
    g.members.push(r);
    r.i.forEach(i=>{if(!g.i.includes(i))g.i.push(i)});
    r.s.forEach(s=>{if(!g.s.includes(s))g.s.push(s)});
    if(r.l>g.l)g.l=r.l; g.a+=r.a; if(r.isNew)g.isNew=true;
  }
  const arr=Object.values(map);
  arr.forEach(g=>g.members.sort((a,b)=>b.l.localeCompare(a.l)));
  const k=state.sort==='n'?'name':state.sort;
  return arr.sort((a,b)=>{
    if(k==='a')return (a.a-b.a)*state.dir;
    if(k==='mcount')return (a.members.length-b.members.length)*state.dir;
    return String(a[k]??a.l).localeCompare(String(b[k]??b.l))*state.dir;});
}
function srcBadge(s){
  if(s==='릴레잇(홈페이지)')return '<span class="badge b-relate">릴레잇</span>';
  if(s==='피트페이퍼')return '<span class="badge b-feat">피트페이퍼</span>';
  if(s==='메일링리스트')return '<span class="badge b-mail">메일링</span>';
  return '<span class="badge b-ind">'+esc(s)+'</span>';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

let srcSig='';
function buildSrcFilter(){
  const have=new Set(); recs.forEach(r=>r.s.forEach(s=>have.add(s)));
  const KNOWN=['릴레잇(홈페이지)','피트페이퍼','수기입력','메일링리스트'];
  const tags=[...have].filter(s=>!KNOWN.includes(s)).sort();
  const items=[['all','소스·태그 전체']];
  if(have.has('릴레잇(홈페이지)'))items.push(['릴레잇(홈페이지)','릴레잇(홈페이지)']);
  if(have.has('피트페이퍼'))items.push(['피트페이퍼','피트페이퍼']);
  tags.forEach(t=>items.push([t,t]));
  if(have.has('수기입력'))items.push(['수기입력','수기입력']);
  if(have.has('메일링리스트'))items.push(['메일링리스트','메일링리스트']);
  items.push(['multi','복수 채널 접점'],['new','신규(미구독)']);
  const sig=items.map(i=>i[0]).join('|');
  const sel=document.getElementById('fSrc');
  if(sig!==srcSig){srcSig=sig;
    sel.innerHTML=items.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join('');
    sel.onchange=()=>{state.src=sel.value;state.page=0;render()};}
  sel.value=state.src; if(sel.value==='')sel.value=state.src='all';
}
function render(){
  buildSrcFilter();
  const slackCust=recs.filter(r=>r.st==='정상'&&r.s.some(s=>s!=='메일링리스트'));
  const newLeads=slackCust.filter(r=>!r.s.includes('메일링리스트'));
  const multi=recs.filter(r=>r.st==='정상'&&r.s.length>=2);
  const nCo=new Set(recs.filter(r=>r.st==='정상'&&r.c).map(r=>normCo(r.c))).size;
  const kp=[['전체 고객',recs.filter(r=>r.st==='정상').length,''],['회사 수',nCo,''],
    ['슬랙 유입 신규 리드',newLeads.length,'hl'],['복수 채널 접점',multi.length,''],
    ['새로 동기화됨',recs.filter(r=>r.isNew).length,'hl']];
  document.getElementById('kpis').innerHTML=kp.map(([l,v,c])=>`<div class="kpi ${c}"><div class="lab">${l}</div><div class="v">${v.toLocaleString()}</div></div>`).join('');

  let html,total,start;
  if(state.view==='company'){
    const gs=companyGroups(); total=gs.length; start=state.page*state.per;
    const rows=gs.slice(start,start+state.per);
    html=`<table><thead><tr><th data-k="name">회사</th><th>부서</th><th>담당자 (이름·직급)</th><th>이메일</th><th>휴대폰</th><th>관심 솔루션</th><th>소스·태그</th><th>업종 / 세부분야</th><th>내부 담당자</th><th>영업 메모</th><th data-k="l">최근활동 ${state.sort==='l'?(state.dir<0?'▾':'▴'):''}</th></tr></thead><tbody>`+
    (rows.length?rows.map(g=>{
      const ci=cinfo(g.key);
      const n=g.members.length;
      const indCell=ci.ind?`<span class="badge b-ind">${esc(ci.ind)}</span>${ci.sub?'<div class="hint">'+esc(ci.sub)+'</div>':''}${ci.edited?'':(ci.auto?'<div><span class="badge b-auto">자동 추정</span></div>':'')}`:'<span class="hint" style="color:var(--accent)">＋ 입력</span>';
      // 부서별 그룹핑 (부서 미상은 빈칸, 맨 뒤로)
      const dmap={};
      g.members.forEach(m=>{const d=(m.d||'').trim();(dmap[d]=dmap[d]||[]).push(m)});
      const depts=Object.keys(dmap).sort((a,b)=>(a===''?1:b===''?-1:a.localeCompare(b)));
      const flat=[];
      depts.forEach(d=>dmap[d].forEach((m,di)=>flat.push({m,d,dFirst:di===0,dLen:dmap[d].length})));
      return flat.map((f,ix)=>{
        const m=f.m;
        const dim=m.st!=='정상'?' dim':'';
        const co=ix===0?`<td rowspan="${n}" class="row cocell" data-co="${esc(g.key)}" style="border-right:1px solid var(--line)"><b>${esc(g.name)}</b>${g.isNew?' <span class="badge b-new">NEW</span>':''}</td>`:'';
        const dept=f.dFirst?`<td rowspan="${f.dLen}" style="border-right:1px dashed var(--line)">${esc(f.d)}</td>`:'';
        const tail=ix===0?`<td rowspan="${n}" class="row cocell" data-co="${esc(g.key)}">${indCell}</td>
        <td rowspan="${n}"><input type="text" class="ownin" list="owners" data-co="${esc(g.key)}" value="${esc(ci.owner)}" placeholder="담당 지정" style="width:90px"></td>
        <td rowspan="${n}"><input type="text" class="memoin" data-co="${esc(g.key)}" value="${esc(ci.memo)}" placeholder="메모 입력" style="width:150px"></td>
        <td rowspan="${n}">${g.l}</td>`:'';
        return `<tr class="mrow${dim}">${co}${dept}
        <td class="row pcell" data-e="${esc(m.e)}"><b>${esc(m.n)||'—'}</b>${m.t?' <span class="hint">'+esc(m.t)+'</span>':''}${m.isNew?' <span class="badge b-new">NEW</span>':''}${m.st!=='정상'?` <span class="badge b-status">${m.st}</span>`:''}</td>
        <td>${esc(m.e)}</td><td>${esc(m.p)}</td><td>${m.i.map(esc).join(', ')}</td><td>${m.s.map(srcBadge).join('')}</td>${tail}</tr>`;
      }).join('');
    }).join(''):'<tr><td colspan="11" class="empty">조건에 맞는 회사가 없습니다</td></tr>')+'</tbody></table>';
  }else{
    const f=filtered(); total=f.length; start=state.page*state.per;
    const rows=f.slice(start,start+state.per);
    html=`<table><thead><tr><th data-k="c">회사</th><th data-k="n">이름</th><th data-k="t">직급</th><th>업종</th><th data-k="e">이메일</th><th data-k="p">휴대폰</th><th>관심 솔루션</th><th>소스</th><th data-k="l">최근활동 ${state.sort==='l'?(state.dir<0?'▾':'▴'):''}</th><th data-k="a">활동</th></tr></thead><tbody>`+
    (rows.length?rows.map(r=>{
      const ci=cinfo(normCo(r.c));
      const dim=r.st!=='정상'?' dim':'';
      return `<tr class="row${dim}" data-e="${esc(r.e)}">
      <td><b>${esc(r.c)}</b></td>
      <td>${esc(r.n)||'<span style="color:#B0B0B6">—</span>'}${r.isNew?' <span class="badge b-new">NEW</span>':''}${r.st!=='정상'?` <span class="badge b-status">${r.st}</span>`:''}</td>
      <td>${esc(r.t)}</td><td>${ci.ind?`<span class="badge b-ind">${esc(ci.ind)}</span>`:''}</td>
      <td>${esc(r.e)}</td><td>${esc(r.p)}</td>
      <td>${r.i.map(esc).join(', ')}</td><td>${r.s.map(srcBadge).join('')}</td>
      <td>${r.l}</td><td>${r.a||''}</td></tr>`;
    }).join(''):'<tr><td colspan="10" class="empty">조건에 맞는 고객이 없습니다</td></tr>')+'</tbody></table>';
  }
  document.getElementById('tablewrap').innerHTML=html;
  document.getElementById('pinfo').textContent=`${total.toLocaleString()}${state.view==='company'?'개 회사':'명'} 중 ${total?start+1:0}–${Math.min(start+state.per,total)}`;
  document.querySelectorAll('#tablewrap tr.row, #tablewrap td.row').forEach(el=>el.onclick=()=>el.dataset.co?openCompany(el.dataset.co):openPerson(el.dataset.e));
  document.querySelectorAll('#tablewrap .memoin, #tablewrap .ownin').forEach(inp=>{
    inp.onclick=e=>e.stopPropagation();
    inp.onchange=()=>{
      const ci=cinfo(inp.dataset.co);
      saveCInfo(inp.dataset.co,{ind:ci.ind,sub:ci.sub,desc:ci.desc,
        memo:inp.classList.contains('memoin')?inp.value.trim():ci.memo,
        owner:inp.classList.contains('ownin')?inp.value.trim():ci.owner});
      toast('저장됨');drawCharts();
    };
  });
  document.querySelectorAll('#tablewrap th[data-k]').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(state.sort===k)state.dir*=-1;else{state.sort=k;state.dir=(k==='l'||k==='a'||k==='mcount')?-1:1}
    render();});
  document.querySelectorAll('.vt').forEach(v=>v.classList.toggle('on',v.dataset.v===state.view));
  localStorage.setItem('rtm-db-ui',JSON.stringify({q:state.q,src:state.src,interest:state.interest,status:state.status,sort:state.sort,dir:state.dir,view:state.view}));
  drawCharts();
}

  const myEv=evts.filter(e=>e.em===em).sort((a,b)=>b.dt.localeCompare(a.dt));
  document.getElementById('dbody').innerHTML=`

let chM,chI;
function drawCharts(){
  const coInd={};
  Object.values(byEmail).filter(r=>r.st==='정상'&&r.c).forEach(r=>{coInd[normCo(r.c)]=true});
  const ind={};
  Object.keys(coInd).forEach(k=>{const i=cinfo(k).ind;if(i)ind[i]=(ind[i]||0)+1});
  const mk=Object.keys(ind).sort((a,b)=>ind[b]-ind[a]).slice(0,8);
  const ints={};
  Object.values(byEmail).filter(r=>r.st==='정상').forEach(r=>r.i.forEach(i=>{if(i)ints[i]=(ints[i]||0)+1}));
  const ik=Object.keys(ints).sort((a,b)=>ints[b]-ints[a]).slice(0,6);
  if(chM)chM.destroy(); if(chI)chI.destroy();
  if(typeof Chart==='undefined')return;
  chM=new Chart(document.getElementById('chIndustry'),{type:'bar',data:{labels:mk,datasets:[{data:mk.map(k=>ind[k]),backgroundColor:mk.map(k=>k==='미입력'?'#D4D4D8':'#EA580C'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{precision:0}}}}});
  chI=new Chart(document.getElementById('chInterest'),{type:'bar',data:{labels:ik,datasets:[{data:ik.map(k=>ints[k]),backgroundColor:'#2563EB',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{precision:0}}}}});
}

// ── Slack 동기화 ──
function parseMessages(text){
  const out=[];
  const blocks=text.split(/=== Message from /).slice(1);
  for(const b of blocks){
    const h=b.match(/^(.+?) \(([UB][A-Z0-9]+)\) at (\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) KST/);
    if(!h)continue;
    const uid=h[2],dt=h[3];
    const tsm=b.match(/Message TS: (\d+\.\d+)/); const ts=tsm?parseFloat(tsm[1]):0;
    const g=(re)=>{const m=b.match(re);return m?m[1].trim():''};
    const mailOf=(s)=>{const m=(s||'').match(/mailto:([^|>\s]+)/);return m?m[1]:(s||'').includes('@')?s.trim():''};
    if(uid==='U07KMNPPYMR'){
      const raw=g(/업무용 이메일: \*(.*?)\*/);
      const em=mailOf(raw)||raw;
      if(!em||!em.includes('@'))continue;
      out.push({ts,dt,src:'relate',em:em.toLowerCase(),nm:g(/이름: \*(.*?)\*/),
        ph:g(/휴대폰 번호: \*(.*?)\*/),co:g(/회사명: \*(.*?)\*/),dept:g(/부서명: \*(.*?)\*/),
        title:g(/직책: \*(.*?)\*/),it:g(/관심 솔루션: \*(.*?)\*/),
        iq:g(/문의내용: \*([\s\S]*?)\*/).slice(0,300)});
    }else if(uid==='U0B9NLK69U3'){
      const doc=g(/\*Document\*\n(.+)/);
      let em=mailOf(b)||g(/\*(?:업무 이메일|Email)\*\n([^\n<]+)/);
      em=(em||'').toLowerCase(); if(!em.includes('@'))continue;
      let nm=g(/\*성함\*\n(.+)/); if(nm.includes('mailto'))nm='';
      const ph=(g(/\*(?:휴대폰 번호|Phone)\*\n(?:<tel:)?([\d\-]+)/)||'');
      const co=g(/\*(?:회사명|Company)\*\n(.+)/);
      out.push({ts,dt,src:'featpaper',em,nm,ph,co,dept:'',title:'',it:doc,iq:''});
    }else if(uid==='B06971EEQJV'&&b.includes('열람 안내')){
      const em=mailOf(b); if(!em)continue;
      const bl=[...b.matchAll(/• ?([^\n•]*)/g)].map(m=>m[1].trim()).filter(x=>x&&!x.startsWith('<https'));
      const doc=(b.match(/\[(.*?) 열람 안내\]/)||[,''])[1];
      let co='',nm='',ph='';
      if(bl.length>=4){co=bl[0];nm=bl[1];ph=bl[3].replace(/\D/g,'')}
      out.push({ts,dt,src:'featpaper',em:em.toLowerCase(),nm,ph,co,dept:'',title:'',it:doc,iq:''});
    }
  }
  return out;
}
async function sync(){
  const btn=document.getElementById('syncBtn');
  btn.disabled=true;btn.textContent='동기화 중…';
  try{
    if(!window.cowork||!window.cowork.callMcpTool)throw new Error('Cowork 환경에서만 동기화할 수 있어요');
    const r=await window.cowork.callMcpTool(TOOL,{channel_id:CH,limit:100,oldest:String(extra.lastTs)});
    if(r.isError)throw new Error('Slack 호출 실패: '+(r.content?.[0]?.text||'').slice(0,120));
    let p=r.structuredContent;
    if(!p){const t=r.content?.[0]?.text||'';try{p=JSON.parse(t)}catch(e){p={messages:t}}}
    const parsed=parseMessages(p.messages||'').filter(e=>e.ts>extra.lastTs);
    let nNew=0,nAct=0;
    parsed.sort((a,b)=>a.ts-b.ts).forEach(e=>{
      if(byEmail[e.em])nAct++;else nNew++;
      applyEvent(e);
      extra.events.push(e);
      if(e.ts>extra.lastTs)extra.lastTs=e.ts;
    });
    localStorage.setItem('rtm-db-extra',JSON.stringify(extra));
    render();
    toast(parsed.length?`동기화 완료 — 신규 리드 ${nNew}건, 기존 고객 활동 ${nAct}건`:'새 리드 없음 — 최신 상태입니다');
    document.getElementById('syncinfo').textContent='마지막 동기화: '+new Date().toLocaleString('ko-KR');
  }catch(err){toast('⚠ '+err.message)}
  btn.disabled=false;btn.textContent='슬랙 새 리드 동기화';
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',4000)}

  </div>`;
  document.getElementById('al-save').onclick=()=>{

    const now=new Date();
    const dt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+now.toTimeString().slice(0,8);
    const tag=val('al-tag');
    const e={ts:now.getTime()/1000,dt,src:'manual',em,nm:val('al-nm'),ph:val('al-ph'),co:val('al-co'),
      dept:val('al-dp'),title:val('al-tt'),it:val('al-it'),iq:[tag?'['+tag+']':'',val('al-iq')].filter(Boolean).join(' ')};

    toast(existed?'기존 고객에 활동으로 추가됨':'신규 리드 등록 완료');
  };
  document.getElementById('drawer').classList.add('open');
}

function exportCSV(){
  let head,lines;
  if(state.view==='company'){
    const gs=companyGroups();
    head=['회사명','업종','세부분야','회사설명','영업메모','내부담당자','인원수','담당자','관심솔루션','소스','최근활동일','활동수'];
    lines=gs.map(g=>{const ci=cinfo(g.key);
      return [g.name,ci.ind,ci.sub,ci.desc,ci.memo,ci.owner,g.members.length,
        g.members.map(m=>(m.n||'?')+(m.t?'('+m.t+')':'')).join(' / '),
        g.i.join(' / '),g.s.join(' + '),g.l,g.a]});
  }else{
    const f=filtered();
    head=['회사명','이름','직급','업종','이메일','휴대폰','관심솔루션','소스','상태','최초유입일','최근활동일','활동수','문의내용'];
    lines=f.map(r=>{const ci=cinfo(normCo(r.c));
      return [r.c,r.n,r.t,ci.ind,r.e,r.p,r.i.join(' / '),r.s.join(' + '),r.st,r.f,r.l,r.a,(r.q||'').replace(/[\n]/g,' ')]});
  }
  const csv=[head.join(',')].concat(lines.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=state.view==='company'?'RTM_회사DB_export.csv':'RTM_고객DB_export.csv';a.click();
}

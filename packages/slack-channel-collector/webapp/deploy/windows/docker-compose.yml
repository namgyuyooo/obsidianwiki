name: rtm-customer-db

services:
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: rtm-customer-db:local
    restart: unless-stopped
    environment:
      RTM_ENV: production
      RTM_CUSTOMER_DB: /data/rtm_customer.db
      RTM_SECRET_KEY_FILE: /run/secrets/rtm_secret_key
      RTM_CORS_ORIGINS: ""
    secrets:
      - rtm_secret_key
    volumes:
      - ./data:/data
      - npm_cache:/home/rtm/.npm
    expose:
      - "8765"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 45s
    networks:
      - private

  caddy:
    platform: linux/amd64
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      RTM_HOST: ${RTM_HOST}
    ports:
      - "${RTM_BIND_IP}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - private

  backup:
    platform: linux/amd64
    image: rtm-customer-db:local
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: ["python3", "scripts/backup_db.py", "watch", "--interval", "86400", "--keep", "14"]
    secrets:
      - rtm_secret_key
    volumes:
      - ./data:/data
      - ./backups:/backups
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - private

secrets:
  rtm_secret_key:
    file: ./secrets/rtm_secret_key

volumes:
  caddy_data:
  caddy_config:
  npm_cache:

networks:
  private:
    driver: bridge
